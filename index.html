/* ---- EXPORT ---- */
function exportToExcel(months,rates){
  const wb=XLSX.utils.book_new();
  MESES.forEach(mes=>{
    const d=months[mes]||{ventas:[],inv:[]};
    const ventas=d.ventas||[],inv=d.inv||[];
    const rows=[['#','CLIENTE','LÍNEA','FORMA PAGO','PRIMA','REFERENCIA','INGRESOS WEB','','FECHA','COLONES','DÓLARES']];
    const maxLen=Math.max(ventas.length,inv.length);
    for(let i=0;i<maxLen;i++){
      const v=ventas[i],r=inv[i];
      rows.push([
        v?i+1:'', v?v.c:'', v?v.l:'', v?v.f:'', v?Number(v.p||0):'', v?v.v:'', v?calcCom(v.p,v.l,rates):'',
        '',
        r?r.fecha:'', r?Number(r.col||0):'', r?Number(r.usd||0):''
      ]);
    }
    const totalP=ventas.reduce((s,v)=>s+Number(v.p||0),0);
    const totalCom=ventas.reduce((s,v)=>s+calcCom(v.p,v.l,rates),0);
    const totalCol=inv.reduce((s,r)=>s+Number(r.col||0),0);
    const totalUSD=inv.reduce((s,r)=>s+Number(r.usd||0),0);
    rows.push(['','','','TOTAL',totalP,'',totalCom,'','TOTAL',totalCol,totalUSD]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:4},{wch:40},{wch:22},{wch:12},{wch:14},{wch:10},{wch:14},{wch:2},{wch:12},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,mes.slice(0,3));
  });
  const resRows=[['MES','PRIMAS TOTALES','INGRESOS WEB','INVERSIÓN ₡','INVERSIÓN $','ROI %']];
  let totP=0,totI=0,totInv=0,totUSD=0;
  MESES.forEach(mes=>{
    const d=months[mes]||{ventas:[],inv:[]};
    const prima=d.ventas.reduce((s,v)=>s+Number(v.p||0),0);
    const ing=d.ventas.reduce((s,v)=>s+calcCom(v.p,v.l,rates),0);
    const inv=d.inv.reduce((s,r)=>s+Number(r.col||0),0);
    const usd=d.inv.reduce((s,r)=>s+Number(r.usd||0),0);
    const roi=inv>0?(ing-inv)/inv*100:null;
    resRows.push([mes,prima,ing,inv,usd,prima>0?roi:null]);
    totP+=prima;totI+=ing;totInv+=inv;totUSD+=usd;
  });
  resRows.push(['TOTAL ANUAL',totP,totI,totInv,totUSD,totInv>0?(totI-totInv)/totInv*100:null]);
  resRows.push([],['META ANUAL',1250000000],['ALCANZADO',totP/1250000000]);
  const wsRes=XLSX.utils.aoa_to_sheet(resRows);
  wsRes['!cols']=[{wch:14},{wch:18},{wch:16},{wch:14},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsRes,'RESUMEN');
  const tasasRows=[['LÍNEA','TASA'],...LINEAS.map(l=>[l,rates[l]||0.15])];
  const wsTasas=XLSX.utils.aoa_to_sheet(tasasRows);
  XLSX.utils.book_append_sheet(wb,wsTasas,'TASAS');
  XLSX.writeFile(wb,'Control_Ventas_2026.xlsx');
}

              <td style={{...tot,textAlign:'right',fontFamily:'monospace'}}>₡{fmtN(totPrima26)}</td>
              <td style={{...tot,textAlign:'right',fontFamily:'monospace',color:'#94a3b8'}}>₡{fmtN(totPrima25)}</td>
              <td style={{...tot,textAlign:'right',fontFamily:'monospace',color:BLUE}}>₡{fmtN(totCom26)}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   APP
================================================================ */
const EXTRA_TABS=[
  {key:'MetaViajero',label:'🛫 Viajero'},
  {key:'Estudiantil',label:'🎓 Estudiantil'},
  {key:'Resumen',label:'📈 Resumen'},
];

function App(){
  const [months,setMonths]=useState(null);
  const [rates,setRates]=useState({...DEFAULT_COM});
  const [tab,setTab]=useState('Enero');
  const [status,setStatus]=useState('');
  const [showTasas,setShowTasas]=useState(false);
  const [exporting,setExporting]=useState(false);

  useEffect(()=>{
    const sd=lsGet(STORAGE_KEY);
    const sr=lsGet(RATES_KEY);
    setMonths(sd||INIT);
    if(sr) setRates(sr);
  },[]);

  const save=useCallback((data,r)=>{
    setStatus('Guardando...');
    lsSet(STORAGE_KEY,data);
    if(r) lsSet(RATES_KEY,r);
    setStatus('✓ Guardado');
    setTimeout(()=>setStatus(''),2000);
  },[]);

  const updateMonths=useCallback((upd)=>{
    setMonths(prev=>{const next=typeof upd==='function'?upd(prev):upd;save(next);return next;});
  },[save]);

  const saveTasas=(nr)=>{setRates(nr);save(months,nr);setShowTasas(false);};

  const handleExport=()=>{
    setExporting(true);
    setTimeout(()=>{try{exportToExcel(months,rates);}catch(e){alert('Error: '+e.message);}setExporting(false);},100);
  };

  if(!months) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,color:'#94a3b8',fontSize:14}}>Cargando...</div>;

  const totAnual=MESES.reduce((s,m)=>s+(months[m]?.ventas||[]).reduce((ss,v)=>ss+Number(v.p||0),0),0);
  const pct=Math.min(100,totAnual/META*100);
  const extraKeys=EXTRA_TABS.map(t=>t.key);

  return(
    <div style={{minHeight:'100vh',background:'#f8fafc',fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif'}}>
      <div style={{background:BLUE,color:'white',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>📊</div>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>Control de Ventas 2026</div>
            <div style={{fontSize:11,opacity:0.75}}>Seguros del INS · Agente Exclusivo</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setShowTasas(true)} style={{padding:'6px 12px',borderRadius:6,border:'1px solid rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.12)',color:'white',cursor:'pointer',fontSize:12,fontWeight:600}}>⚙️ Tasas</button>
          <button onClick={handleExport} disabled={exporting} style={{padding:'6px 14px',borderRadius:6,border:'1px solid rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.15)',color:'white',cursor:exporting?'wait':'pointer',fontSize:12,fontWeight:700}}>
            {exporting?'⏳ Exportando...':'📥 Exportar Excel'}
          </button>
          <div style={{textAlign:'right',marginLeft:4}}>
            <div style={{fontSize:13,fontWeight:700}}>{pct.toFixed(1)}% · ₡{fmtN(totAnual)}</div>
            {status&&<div style={{fontSize:10,opacity:0.8}}>{status}</div>}
          </div>
        </div>
      </div>
      <div style={{height:5,background:'rgba(255,255,255,0.2)',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',left:0,top:0,width:`${pct}%`,height:'100%',background:'#22c55e'}}></div>
      </div>
      {/* Tab bar */}
      <div style={{background:'white',borderBottom:'1px solid #f1f5f9',display:'flex',overflowX:'auto',paddingLeft:6}}>
        {MESES.map(m=>{
          const active=tab===m;
          const hasData=(months[m]?.ventas?.length>0);
          return(
            <button key={m} onClick={()=>setTab(m)} style={{padding:'10px 11px',fontSize:12,fontWeight:active?700:400,color:active?BLUE:'#64748b',borderBottom:active?`2px solid ${BLUE}`:'2px solid transparent',background:'none',border:'none',cursor:'pointer',whiteSpace:'nowrap',borderRadius:0,outline:'none',position:'relative'}}>
              {m.slice(0,3)}
              {hasData&&!active&&<span style={{position:'absolute',top:7,right:5,width:4,height:4,background:'#22c55e',borderRadius:'50%'}}></span>}
            </button>
          );
        })}
        {/* Divider */}
        <div style={{width:1,background:'#f1f5f9',margin:'8px 4px'}}></div>
        {EXTRA_TABS.map(({key,label})=>{
          const active=tab===key;
          return(
            <button key={key} onClick={()=>setTab(key)} style={{padding:'10px 12px',fontSize:12,fontWeight:active?700:400,color:active?(key==='MetaViajero'?'#059669':key==='Estudiantil'?'#d97706':BLUE):'#64748b',borderBottom:active?`2px solid ${key==='MetaViajero'?'#059669':key==='Estudiantil'?'#d97706':BLUE}`:'2px solid transparent',background:'none',border:'none',cursor:'pointer',whiteSpace:'nowrap',borderRadius:0,outline:'none'}}>
              {label}
            </button>
          );
        })}
      </div>
      {/* Content routing */}
      {tab==='Resumen'&&<ResumenView months={months} rates={rates}/>}
      {tab==='MetaViajero'&&<MetaViajeroView months={months} rates={rates}/>}
      {tab==='Estudiantil'&&<EstudiantilView months={months} rates={rates}/>}
      {!extraKeys.includes(tab)&&<MonthView mes={tab} data={months[tab]||{ventas:[],inv:[]}} updateMonths={updateMonths} rates={rates}/>}
      {showTasas&&<TasasModal rates={rates} onSave={saveTasas} onClose={()=>setShowTasas(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
